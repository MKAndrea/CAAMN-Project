<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La mia pagina</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #fff;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .hero h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #1a1a2e;
    }

    .hero p {
      font-size: 1.1rem;
      color: #555;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: #1a1a2e;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #2e2e5e;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #999;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <header>
    <h1>MySite</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Chi siamo</a>
      <a href="#">Contatti</a>
    </nav>
  </header>

  <main>
    <div class="hero">
      <h2>Benvenuto!</h2>
      <p>Questa è una pagina HTML semplice e pulita. Puoi modificarla e personalizzarla come preferisci.</p>
      <a href="#" class="btn">Inizia ora</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 MySite. Tutti i diritti riservati.</p>
  </footer>

</body>
</html>
